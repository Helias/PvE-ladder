@if (isPlayerPage()) {
  <header class="flex items-center border-b border-[#333] bg-[#111] px-4 py-2">
    <a routerLink="/" class="inline-flex items-center gap-2 text-lg font-bold text-white no-underline hover:text-wow-gold">
      <span aria-hidden="true">&larr;</span> Players Stats
    </a>
    <div class="flex flex-1 justify-center">
      <app-player-header />
    </div>
  </header>
} @else {
  <header class="border-b border-[#333] bg-[#111] py-4 text-center">
    <h1>
      <a routerLink="/" class="text-3xl font-bold text-white no-underline hover:text-wow-gold">
        Players Stats
      </a>
    </h1>
  </header>
}

<main>
  <router-outlet />
</main>

<footer class="mt-8 border-t border-[#333] py-4 text-center text-sm text-gray-500">
  Players Stats &mdash; Created by
  <a
    href="https://github.com/Helias"
    target="_blank"
    rel="noopener noreferrer"
    class="text-wow-gold hover:text-wow-gold-light"
    >Helias</a
  >
  &&
  <a
    href="https://github.com/Yehonal"
    target="_blank"
    rel="noopener noreferrer"
    class="text-wow-gold hover:text-wow-gold-light"
    >Yehonal</a
  >
</footer>
